<!-- Shared Delete Confirm Modal -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal modal-sm">
    <div class="modal-header danger-header">
      <h2><i class="fa-solid fa-triangle-exclamation"></i> Confirm Delete</h2>
      <button class="modal-close" onclick="closeModal('delete-modal')">×</button>
    </div>
    <div class="modal-body">
      <p>Are you sure you want to delete this record? This action <strong>cannot be undone</strong>.</p>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('delete-modal')">Cancel</button>
      <form id="delete-form" method="POST">
        <button type="submit" class="btn-danger"><i class="fa-solid fa-trash"></i> Yes, Delete</button>
      </form>
    </div>
  </div>
</div>
